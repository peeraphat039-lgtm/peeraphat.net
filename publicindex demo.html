<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Real-Time Monitor</title>

<style>
  :root {
    /* ✅ Corporate Color */
    --run: #00a86b;
    --down: #d63031;
    --maint: #0984e3;
    --card-bg: #ffffff;
    --bg: #f4f6f9;
  }

  body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: var(--bg);
    padding: 30px;
  }

  h1 {
    border-left: 6px solid #1f4fd8;
    padding-left: 12px;
    color: #333;
  }

  .zone {
    margin-top: 30px;
  }

  .zone-title {
    font-size: 20px;
    margin-bottom: 10px;
    color: #1f4fd8;
  }

  .line-title {
    margin: 10px 0;
    font-size: 16px;
    color: #555;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--card-bg);
    border-radius: 14px;
    padding: 18px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    transition: all 0.4s ease;
    border-left: 8px solid #ccc;
    position: relative;
    animation: fadeIn 0.4s ease;
  }

  /* ✅ Animation */
  .card.active {
    transform: scale(1.03);
    box-shadow: 0 10px 22px rgba(0,0,0,0.15);
  }

  .RUN  { border-color: var(--run); }
  .DOWN { border-color: var(--down); }
  .MAINT{ border-color: var(--maint); }

  .status {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 5px;
  }

  .RUN .status   { color: var(--run); }
  .DOWN .status  { color: var(--down); }
  .MAINT .status { color: var(--maint); }

  .mc-name {
    font-size: 15px;
    color: #555;
    margin-top: 8px;
  }

  .time {
    font-size: 12px;
    color: #888;
    margin-top: 4px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<body>

<h1>Real‑Time Monitor</h1>

<div id="dashboard"></div>

<script>
/* ✅ Sample MC Data (แทน Backend ได้) */
const machines = [
  { zone: "Zone A", line: "Line 1", mc: "MC-01", status: "RUN" },
  { zone: "Zone A", line: "Line 1", mc: "MC-02", status: "DOWN" },
  { zone: "Zone A", line: "Line 2", mc: "MC-03", status: "MAINT" },
  { zone: "Zone B", line: "Line 3", mc: "MC-04", status: "RUN" }
];

function render() {
  const dash = document.getElementById("dashboard");
  dash.innerHTML = "";

  const zones = [...new Set(machines.map(m => m.zone))];

  zones.forEach(zone => {
    const zDiv = document.createElement("div");
    zDiv.className = "zone";

    zDiv.innerHTML = `<div class="zone-title">${zone}</div>`;
    dash.appendChild(zDiv);

    const lines = [...new Set(machines.filter(m => m.zone === zone).map(m => m.line))];

    lines.forEach(line => {
      const lDiv = document.createElement("div");
      lDiv.className = "line-title";
      lDiv.innerText = line;
      zDiv.appendChild(lDiv);

      const grid = document.createElement("div");
      grid.className = "grid";
      zDiv.appendChild(grid);

      machines
        .filter(m => m.zone === zone && m.line === line)
        .forEach(m => {
          const card = document.createElement("div");
          card.className = `card ${m.status} active`;

          card.innerHTML = `
            <div class="status">${m.status}</div>
            <div class="mc-name">${m.mc}</div>
            <div class="time">${new Date().toLocaleTimeString()}</div>
          `;
          grid.appendChild(card);
        });
    });
  });
}

render();
</script>

</body>
</html>
